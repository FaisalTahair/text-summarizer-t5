<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Text Summarizer</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

.container {
    max-width: 700px;
    margin: 60px auto;
    padding: 25px;
    background: #1e293b;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

h1 {
    text-align: center;
    color: #38bdf8;
}

h3 {
    text-align: center;
    color: #94a3b8;
}

textarea {
    width: 100%;
    height: 160px;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 15px;
    background: #0f172a;
    color: #e2e8f0;
}

button {
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: white;
    border: none;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.85;
}

#summary-box {
    margin-top: 20px;
    padding: 15px;
    background: #0f172a;
    border-radius: 8px;
    border: 1px solid #334155;
}

</style>
</head>

<body>

<div class="container">
    <h1>AI Text Summarizer</h1>
    <h3>Powered by T5 Transformer</h3>

    <textarea id="inputText" placeholder="Paste your text here..."></textarea>

    <button onclick="summarizeText()">Summarize</button>

    <div id="summary-box">
        <strong>Summary:</strong>
        <p id="outputText"></p>
    </div>
</div>

<script>
async function summarizeText() {
    const input = document.getElementById("inputText").value;
    const output = document.getElementById("outputText");

    if (!input.trim()) return;

    output.innerText = "Processing...";

    try {
        const response = await fetch("/summarize/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ dialogue: input })
        });

        const data = await response.json();
        output.innerText = data.summary;

    } catch (error) {
        output.innerText = "Error occurred!";
    }
}
</script>

</body>
</html>
